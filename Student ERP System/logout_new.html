<!DOCTYPE html>
<html>
<head>
  <title>Logout</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;

      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      background: linear-gradient(135deg, #667eea, #764ba2);
    }

    /* ✅ WHITE BOX */
    .box {
      background: white;
      padding: 40px;
      border-radius: 15px;
      text-align: center;

      width: 300px;

      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    h2 {
      margin-bottom: 15px;
      color: #2c3e50;
    }

    p {
      color: #7f8c8d;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;

      background: #3498db;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #2980b9;
    }

  </style>
</head>

<body>

<div class="box">
  <h2>You have been logged out</h2>
  <p>Thank you for using the portal</p>

  <button onclick="goLogin()">Login Again</button>
</div>

<script>
function goLogin(){
  localStorage.clear();
  window.location.href = "login.html";
}
</script>

</body>
</html>
